name: ifile_package
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write  # 允许创建并写入 GitHub Release

jobs:
  build:
    runs-on: ubuntu-latest  # 🎯 极致优化：单台 Linux 搞定全平台交叉编译与打包，省时省钱

    steps:
    - name: 拉取代码
      uses: actions/checkout@v4

    # 1. 优先安装 pnpm（解决先有鸡还是先有蛋的死锁）
    - name: 安装 pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9

    # 2. 纯净设置 Node.js 环境
    - name: 设置 Node.js 环境
      uses: actions/setup-node@v4
      with:
        node-version: 'latest'

    # 3. 挂载 pnpm 高速静态缓存
    - name: 获取 pnpm 缓存路径
      id: pnpm-cache
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

    - name: 挂载 pnpm 静态缓存
      uses: actions/cache@v4
      with:
        path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    # 4. 安装 Web 依赖并构建前端
    - name: 安装 web 依赖
      working-directory: ./ifile_frontend
      run: |
        # 显式允许 esbuild 运行构建脚本，粉碎 [ERR_PNPM_IGNORED_BUILDS] 报错
        pnpm config set only-built-dependencies esbuild
        pnpm install

    - name: 构建前端项目
      working-directory: ./ifile_frontend
      run: pnpm run build

    # 5. 安装 Go 环境
    - name: 安装 Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
        cache: true                # 开启 Go 编译和模块依赖缓存

    # 6. 编译多平台 Go 项目 (不依赖 CGO，全平台原生静态编译)
    - name: 编译多平台 Go 项目
      shell: bash
      run: |
        echo "正在编译 Linux 版本..."
        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o ifile_amd64 .
        
        echo "正在编译 Windows 版本..."
        CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o ifile.exe .
        
        echo "正在编译 macOS (M1/M2/M3 ARM64) 版本..."
        CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o ifile_aarch64 .

    # 7. ✨ 核心业务回归：统一在 Linux 环境下将三端二进制包与 static 静态资源夹打包为 zip
    - name: 打包为 zip
      shell: bash
      run: |
        zip -r ifile_linux.zip ifile_amd64 static
        zip -r ifile_windows.zip ifile.exe static
        zip -r ifile_macos.zip ifile_aarch64 static

    # 8. 🔥 核心业务回归：将打包好的 3 个 zip 文件统一上传到 GitHub Artifacts
    - name: 上传打包产物
      uses: actions/upload-artifact@v4
      with:
        name: ifile_all_platforms
        path: "ifile*.zip"

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
    # 1. 下载在上一步中打包好的全平台 zip 产物
    - name: 下载所有平台的 zip 产物
      uses: actions/download-artifact@v4
      with:
        name: ifile_all_platforms
        path: ./release

    # 2. 算力动态生成短 SHA 供 Release 命名使用
    - name: 设置短 SHA
      run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

    # 3. 🚀 核心业务回归：调用 softprops 自动创建 Release 并推送到 GitHub
    - name: 创建 Release 并上传 zip
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v0-${{ github.run_number }}-${{ env.SHORT_SHA }}"
        name: "Release v0-${{ github.run_number }}-${{ env.SHORT_SHA }}"
        files: |
          ./release/ifile_windows.zip
          ./release/ifile_macos.zip
          ./release/ifile_linux.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
